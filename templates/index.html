<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>

    <link rel="stylesheet" href="static/main.css" />
  </head>
  <body>
    <!-- * Building a Frontend for ML APIs and Local Testing -->

    <div class="container">
      <h1>👶 Birth Weight Predictor</h1>

      <form action="/predict" method="post">
        <div class="form-group">
          <label>Gestation</label>
          <input type="number" name="gestation" />
        </div>

        <div class="form-group">
          <label>Parity</label>
          <input type="number" name="parity" />
        </div>

        <div class="form-group">
          <label>Age</label>
          <input type="number" name="age" />
        </div>

        <div class="form-group">
          <label>Height</label>
          <input type="number" name="height" />
        </div>

        <div class="form-group">
          <label>Weight</label>
          <input type="number" name="weight" />
        </div>

        <div class="form-group">
          <label>Smoke (0/1)</label>
          <input type="number" name="smoke" />
        </div>

        <button type="submit">Predict Birth Weight</button>
      </form>
      <br />
      <h3>Expected Child Birth Weight is : {{response}}</h3>
    </div>
  </body>
</html>
